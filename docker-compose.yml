services:
  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.18
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092,OUTSIDE://localhost:19092
    ports:
      - "19092:19092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info --brokers=localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      SQLITE_DB_PATH: data/alerts.db
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  model_serving:
    build:
      context: .
      dockerfile: model_serving/Dockerfile
    volumes:
      - ./model_training/artifacts:/app/model_training/artifacts
    ports:
      - "8010:8010"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8010/health', timeout=3).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  stream_processor:
    build:
      context: .
      dockerfile: stream_processor/Dockerfile
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      RAW_EVENTS_TOPIC: cloud-security-events
      ALERT_API_BASE_URL: http://api:8000
      MODEL_API_BASE_URL: http://model_serving:8010
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
    depends_on:
      model_serving:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      api:
        condition: service_healthy

  producer:
    build:
      context: .
      dockerfile: producer/Dockerfile
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      RAW_EVENTS_TOPIC: cloud-security-events
      EVENT_GENERATION_RATE: 8
      EVENT_GENERATION_BURST_PROBABILITY: 0.08
    depends_on:
      redpanda:
        condition: service_healthy

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    environment:
      API_BASE_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8501:8501"
